config-version = 2

after-startup-command = []
start-at-login = false

enable-normalization-flatten-containers = false
enable-normalization-opposite-orientation-for-nested-containers = false

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
accordion-padding = 30

on-focused-monitor-changed = []

persistent-workspaces = ['1', '2', '3', '4', '5']

[key-mapping]
    preset = 'qwerty'

[exec]
    inherit-env-vars = true

[exec.env-vars]
    PATH = '/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:${PATH}'

[gaps]
    inner.horizontal = 4
    inner.vertical = 4
    outer.left = 8
    outer.bottom = 8
    outer.top = 8
    outer.right = 8

[mode.main.binding]
    cmd-t = 'exec-and-forget open -na Ghostty'

    cmd-q = 'close --quit-if-last-window'

    cmd-h = 'focus left'
    cmd-j = 'focus down'
    cmd-k = 'focus up'
    cmd-l = 'focus right'

    cmd-shift-h = 'move left'
    cmd-shift-j = 'move down'
    cmd-shift-k = 'move up'
    cmd-shift-l = 'move right'

    cmd-1 = 'workspace 1'
    cmd-2 = 'workspace 2'
    cmd-3 = 'workspace 3'
    cmd-4 = 'workspace 4'
    cmd-5 = 'workspace 5'

    cmd-shift-1 = 'move-node-to-workspace 1'
    cmd-shift-2 = 'move-node-to-workspace 2'
    cmd-shift-3 = 'move-node-to-workspace 3'
    cmd-shift-4 = 'move-node-to-workspace 4'
    cmd-shift-5 = 'move-node-to-workspace 5'

    cmd-f = 'fullscreen'
    cmd-shift-f = 'layout floating tiling'
    cmd-b = 'split horizontal'
    cmd-v = 'split vertical'
    cmd-e = 'layout tiles accordion'

    cmd-ctrl-h = 'resize width -10'
    cmd-ctrl-j = 'resize height +10'
    cmd-ctrl-k = 'resize height -10'
    cmd-ctrl-l = 'resize width +10'
    cmd-r = 'mode resize'

    cmd-shift-c = 'reload-config'

[mode.resize.binding]
    h = 'resize width -10'
    j = 'resize height +10'
    k = 'resize height -10'
    l = 'resize width +10'

    enter = 'mode main'
    esc = 'mode main'

[[on-window-detected]]
    if.window-title-regex-substring = '^Picture-in-Picture$'
    run = 'layout floating'
