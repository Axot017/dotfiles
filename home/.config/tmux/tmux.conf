set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

set -g mouse on
set -g history-limit 10000
set -g set-clipboard on
set -g escape-time 0

set -g status-position top
set -g status-interval 5
set -g status-style "fg=#c0caf5,bg=#24283b"
set -g message-style "fg=#c0caf5,bg=#1f2335"
set -g mode-style "fg=#24283b,bg=#7aa2f7"
set -g pane-border-style "fg=#414868"
set -g pane-active-border-style "fg=#7aa2f7"

setw -g window-status-style "fg=#565f89,bg=#24283b"
setw -g window-status-current-style "fg=#1a1b26,bg=#7aa2f7,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

set -g status-left "#[fg=#7aa2f7,bold] #S #[default]"
set -g status-right "#[fg=#9ece6a]%Y-%m-%d #[fg=#7dcfff]%H:%M #[fg=#e0af68]#h "

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"
