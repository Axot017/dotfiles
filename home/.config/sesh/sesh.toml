[[window]]
name = "nvim"
startup_script = "nvim"

[[window]]
name = "pi"
startup_script = "pi"

[[window]]
name = "srv"


[[wildcard]]
pattern = "~/Projects/*"
preview_command = "eza --all --git --icons --color=always {}"
windows = ["nvim", "pi", "srv"]

[[session]]
name = "Home"
preview_command = "fastfetch"
path = "~"

[[session]]
name = "Dotfiles"
preview_command = "eza --all --git --icons --color=always {}"
path = "~/.dotfiles"
windows = ["nvim", "pi"]

[default_session]
preview_command = "eza --all --git --icons --color=always {}"
